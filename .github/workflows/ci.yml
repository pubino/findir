name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck --severity=warning findir

  test-docker-bash32:
    name: Tests (bash 3.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: docker build -f Dockerfile -t findir-test-bash32 . && docker run --rm findir-test-bash32

  test-docker-bash52:
    name: Tests (bash 5.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: docker build -f Dockerfile.bash5 -t findir-test-bash52 . && docker run --rm findir-test-bash52

  test-macos:
    name: Tests (macOS native)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Run ShellCheck
        run: |
          brew install shellcheck
          shellcheck --severity=warning findir
      - name: Run tests
        run: bats tests/
